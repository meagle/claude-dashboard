<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- macOS-style dark rounded background -->
  <rect width="512" height="512" rx="96" fill="#18181B"/>

  <!-- 1×3 grid of session cards -->
  <!-- Padding: 44px, gap: 16px, card: 424×130 -->
  <!-- Card content area: 14px top/bottom padding, 5 elements (title + 4 lines), 16px gaps -->

  <!-- Row 1 — active -->
  <rect x="44" y="44" width="424" height="130" rx="14" fill="#27272A"/>
  <rect x="58" y="58" width="5" height="102" rx="2.5" fill="#E8866A"/>
  <rect x="72" y="58" width="120" height="9" rx="4.5" fill="#52525B"/>
  <rect x="72" y="83" width="280" height="7" rx="3.5" fill="#3F3F46"/>
  <rect x="72" y="106" width="220" height="7" rx="3.5" fill="#3F3F46"/>
  <rect x="72" y="129" width="260" height="7" rx="3.5" fill="#3F3F46"/>
  <rect x="72" y="152" width="180" height="7" rx="3.5" fill="#3F3F46"/>
  <circle cx="448" cy="66" r="9" fill="#E8866A"/>

  <!-- Row 2 — active (slightly dimmer) -->
  <rect x="44" y="190" width="424" height="130" rx="14" fill="#27272A"/>
  <rect x="58" y="204" width="5" height="102" rx="2.5" fill="#E8866A" opacity="0.65"/>
  <rect x="72" y="204" width="148" height="9" rx="4.5" fill="#52525B"/>
  <rect x="72" y="229" width="300" height="7" rx="3.5" fill="#3F3F46"/>
  <rect x="72" y="252" width="240" height="7" rx="3.5" fill="#3F3F46"/>
  <rect x="72" y="275" width="280" height="7" rx="3.5" fill="#3F3F46"/>
  <rect x="72" y="298" width="200" height="7" rx="3.5" fill="#3F3F46"/>
  <circle cx="448" cy="212" r="9" fill="#E8866A" opacity="0.65"/>

  <!-- Row 3 — idle/done -->
  <rect x="44" y="336" width="424" height="130" rx="14" fill="#27272A"/>
  <rect x="58" y="350" width="5" height="102" rx="2.5" fill="#3F3F46"/>
  <rect x="72" y="350" width="160" height="9" rx="4.5" fill="#52525B"/>
  <rect x="72" y="375" width="260" height="7" rx="3.5" fill="#3F3F46"/>
  <rect x="72" y="398" width="200" height="7" rx="3.5" fill="#3F3F46"/>
  <rect x="72" y="421" width="240" height="7" rx="3.5" fill="#3F3F46"/>
  <rect x="72" y="444" width="160" height="7" rx="3.5" fill="#3F3F46"/>
  <circle cx="448" cy="358" r="9" fill="#3F3F46"/>
</svg>
