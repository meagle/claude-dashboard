<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html { height: 100%; }
      body {
        font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
        font-size: 16px;
        background: #141414;
        color: #d4d4d4;
        margin: 0;
        padding: 6px 0 0;
        min-width: 680px;
        height: 100%;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 12px 6px;
        border-bottom: 1px solid #252525;
        flex-shrink: 0;
      }
      #header .title { font-weight: bold; color: #e0e0e0; font-size: 13px; }
      #header #summary { color: #555; font-size: 14px; }
      #header #header-right { display: flex; align-items: center; gap: 10px; }
      #settings-btn, #popout-btn, #pin-btn, #close-btn {
        background: none; border: none; cursor: pointer;
        color: #888; font-size: 16px; padding: 0 2px; line-height: 1;
        transition: color 0.15s;
      }
      #settings-btn:hover, #popout-btn:hover { color: #ccc; }
      #settings-btn.active { color: #5acce0; }
      #pin-btn { color: #555; }
      #pin-btn:hover { color: #cc4444; }
      #pin-btn.pinned { color: #cc4444; }
      #close-btn:hover { color: #e06060; }

      /* ── Detached panel ──────────────────────────────────── */
      body.detached {
        padding-top: 0;
        -webkit-app-region: no-drag;
      }
      body.detached #header {
        -webkit-app-region: drag;
        padding-top: 10px;
        padding-bottom: 8px;
      }
      body.detached #header button,
      body.detached #header span {
        -webkit-app-region: no-drag;
      }
      #popout-btn  { display: inline-block; }
      #detached-controls { display: none; }
      body.detached #popout-btn  { display: none; }
      body.detached #detached-controls { display: flex; align-items: center; gap: 8px; }

      #sessions { padding: 8px; overflow-y: auto; flex: 1; gap: 6px; display: flex; flex-direction: column; }
      #empty { color: #444; text-align: center; padding: 24px 0; }

      /* ── Settings panel ──────────────────────────────────── */
      #settings-panel {
        display: none;
        padding: 16px;
        flex-direction: column;
        gap: 14px;
        flex: 1;
      }
      #settings-panel.open { display: flex; }
      .setting-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .setting-label { color: #c0c0c0; font-size: 14px; }
      .setting-desc  { color: #555; font-size: 12px; margin-top: 2px; }
      .setting-control { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
      .setting-control input[type="number"] {
        background: #1e1e1e; border: 1px solid #333; border-radius: 4px;
        color: #d4d4d4; font-family: inherit; font-size: 14px;
        padding: 3px 7px; width: 64px; text-align: right;
      }
      .setting-control input[type="number"]:focus { outline: none; border-color: #5acce0; }
      .setting-unit { color: #555; font-size: 13px; }
      .setting-divider { border: none; border-top: 1px solid #252525; margin: 0; }
      .setting-toggle {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }
      .toggle-switch {
        position: relative; width: 36px; height: 20px; flex-shrink: 0;
      }
      .toggle-switch input { opacity: 0; width: 0; height: 0; }
      .toggle-track {
        position: absolute; inset: 0;
        background: #2a2a2a; border-radius: 20px; cursor: pointer;
        transition: background 0.2s;
      }
      .toggle-track::before {
        content: ''; position: absolute;
        width: 14px; height: 14px; left: 3px; bottom: 3px;
        background: #666; border-radius: 50%; transition: transform 0.2s, background 0.2s;
      }
      .toggle-switch input:checked + .toggle-track { background: #0d4f5a; }
      .toggle-switch input:checked + .toggle-track::before { transform: translateX(16px); background: #5acce0; }
      #save-settings {
        align-self: flex-end;
        background: #0a3a42; border: 1px solid #5acce0; border-radius: 4px;
        color: #5acce0; cursor: pointer; font-family: inherit; font-size: 13px;
        padding: 5px 16px; transition: background 0.15s;
      }
      #save-settings:hover { background: #0d4f5a; }

      /* ── Cards ───────────────────────────────────────────── */
      .card {
        border: 1px solid #2a2a2a;
        border-radius: 6px;
        padding: 8px 11px 7px;
        cursor: pointer;
        transition: background 0.1s;
      }
      .card:hover { background: #1e1e1e; }
      .dismiss-btn {
        flex-shrink: 0; margin-left: 6px;
        background: none; border: none; cursor: pointer;
        color: #555; font-size: 13px; line-height: 1;
        padding: 0 2px; opacity: 0; transition: opacity 0.15s, color 0.15s;
      }
      .card:hover .dismiss-btn { opacity: 1; }
      .dismiss-btn:hover { color: #e06060; }
      .card.active  { border-color: #238636; }
      .card.waiting { border-color: #b45309; }
      .card.done    { border-color: #252525; opacity: 0.50; }

      @keyframes flash-complete {
        0%   { border-color: #3a8a3a; box-shadow: 0 0 8px rgba(58,138,58,0.5); }
        50%  { border-color: #5cb85c; box-shadow: 0 0 14px rgba(92,184,92,0.8); }
        100% { border-color: #3a8a3a; box-shadow: 0 0 8px rgba(58,138,58,0.5); }
      }
      .card.newly-done {
        animation: flash-complete 0.7s ease 3;
        border-color: #3a8a3a !important;
        opacity: 1 !important;
      }

      /* ── Header: two-line layout ─────────────────────────── */
      .card-header {
        display: flex;
        flex-direction: column;
        gap: 2px;
        margin-bottom: 5px;
        line-height: 1.4;
      }
      .card-header-top {
        display: flex;
        align-items: baseline;
        gap: 18px;
        white-space: nowrap;
        overflow: hidden;
      }
      .card-header-top .elapsed { margin-left: auto; flex-shrink: 0; }
      .card-header-sub {
        display: flex;
        align-items: baseline;
        gap: 16px;
        white-space: nowrap;
        overflow: hidden;
      }
      .badge-active  { color: #3fb950; font-weight: bold; flex-shrink: 0; }
      .badge-waiting { color: #d97706; font-weight: bold; flex-shrink: 0; }
      .badge-done    { color: #555;    font-weight: bold; flex-shrink: 0; }
      .badge-idle    { color: #444;    font-weight: bold; flex-shrink: 0; }
      .badge-loop    { color: #c75050; font-weight: bold; }
      .dirname { font-weight: bold; color: #e8e8e8; flex-shrink: 0; }
      .card-path-wrap {
        display: inline-flex;
        align-items: center;
        min-width: 0;
        cursor: pointer;
        flex-shrink: 1;
      }
      .card-path {
        color: #5a5a5a;
        font-size: 14px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .card-path-wrap:hover .card-path { color: #aaa; }
      .copy-icon {
        flex-shrink: 0;
        color: #383838;
        padding: 0 6px;
        display: inline-flex;
        align-items: center;
        line-height: 1;
        transition: color 0.15s;
      }
      .card-path-wrap:hover .copy-icon { color: #5acce0; }
      .branch { color: #4a8a4a; font-size: 14px; flex-shrink: 0; white-space: nowrap; }
      .git-summary { color: #4a4a4a; font-size: 14px; flex-shrink: 0; white-space: nowrap; margin-left: auto; }
      .elapsed { color: #444; font-size: 14px; flex-shrink: 0; }

      /* ── Task row ─────────────────────────────────────────── */
      .card-task {
        font-size: 14px;
        color: #c0c0c0;
        margin-top: 14px;
        margin-bottom: 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Tasks counts + progress on same row ─────────────── */
      .card-tasks-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
        font-size: 14px;
        color: #888;
      }
      .tasks-counts { flex-shrink: 0; }

      /* ── Tool / subagent row ──────────────────────────────── */
      .card-tool-row {
        font-size: 14px;
        color: #777;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 2px;
      }
      .detail-tool   { color: #9a5dc0; }
      .tool-summary  { color: #555; }
      .detail-agent  { color: #4a8a4a; }

      /* ── Alerts ───────────────────────────────────────────── */
      .card-alert { color: #c07800; font-size: 14px; margin-bottom: 2px; }
      .card-git   { color: #4a4a4a; font-size: 14px; margin-bottom: 2px; }

      /* ── Q→A answer / partial response ──────────────────── */
      .card-qa-answer {
        font-size: 14px;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        padding-left: 14px;
        margin-top: 2px;
        margin-bottom: 4px;
      }
      .card-qa-tool { color: #7a5fa8; }

      /* ── Fallback last message ────────────────────────────── */
      .card-last-msg {
        font-size: 14px;
        color: #888;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ── Done card compact row ────────────────────────────── */
      .card-done-row {
        font-size: 14px;
        color: #777;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .done-time { color: #4a4a4a; }

      /* ── Footer: model + ctx ──────────────────────────────── */
      .card-footer {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 16px;
      }
      .model-badge {
        background: #0a3a42;
        color: #5acce0;
        font-size: 13px;
        font-weight: bold;
        padding: 1px 5px;
        border-radius: 3px;
        flex-shrink: 0;
      }
      .ctx-bar  { display: flex; align-items: center; gap: 5px; }
      .ctx-track {
        width: 80px; height: 5px;
        background: #252525;
        border-radius: 2px;
        overflow: hidden;
      }
      .ctx-fill      { height: 100%; background: #2a6a2a; border-radius: 2px; transition: width 0.3s; }
      .ctx-fill.warn { background: #7a4a00; }
      .ctx-fill.crit { background: #7a1a1a; }
      .ctx-pct { color: #555; font-size: 14px; }
      .cost-badge { color: #888; font-size: 13px; flex-shrink: 0; }

      #footer { display: none; }
    </style>
  </head>
  <body>
    <div id="header">
      <span class="title">🤖 Claude Dashboard</span>
      <span id="header-right">
        <span id="summary"></span>
        <button id="popout-btn" title="Open as standalone panel">⧉</button>
        <button id="settings-btn" title="Settings">⚙</button>
        <span id="detached-controls">
          <button id="pin-btn" title="Toggle always on top"><svg viewBox="0 0 16 16" width="13" height="13" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M9.828.722a.5.5 0 0 1 .354.146l4.95 4.95a.5.5 0 0 1 0 .707c-.48.48-1.072.588-1.503.588-.177 0-.335-.018-.46-.039l-3.134 3.134a5.927 5.927 0 0 1 .16 1.013c.046.702-.032 1.687-.72 2.375a.5.5 0 0 1-.707 0l-2.829-2.828-3.182 3.182c-.195.195-1.219.902-1.414.707-.195-.195.512-1.22.707-1.414l3.182-3.182-2.828-2.829a.5.5 0 0 1 0-.707c.688-.688 1.673-.767 2.375-.72a5.922 5.922 0 0 1 1.013.16l3.134-3.133a2.772 2.772 0 0 1-.04-.461c0-.43.108-1.022.589-1.503a.5.5 0 0 1 .353-.146z"/></svg></button>
          <button id="close-btn" title="Close panel">✕</button>
        </span>
      </span>
    </div>
    <div id="sessions"></div>
    <div id="settings-panel">
      <div class="setting-row">
        <div>
          <div class="setting-label">Stale session timeout</div>
          <div class="setting-desc">Hide sessions with no activity after this long</div>
        </div>
        <div class="setting-control">
          <input type="number" id="stale-minutes" min="5" max="480" value="30" />
          <span class="setting-unit">min</span>
        </div>
      </div>
      <hr class="setting-divider" />
      <div class="setting-row">
        <label class="setting-toggle" for="show-branch">
          <span class="setting-label">Show git branch</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="show-branch" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <label class="setting-toggle" for="show-git-summary">
          <span class="setting-label">Show git diff summary</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="show-git-summary" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <label class="setting-toggle" for="show-subagents">
          <span class="setting-label">Show subagent info</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="show-subagents" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <label class="setting-toggle" for="show-model">
          <span class="setting-label">Show model &amp; context</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="show-model" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <label class="setting-toggle" for="show-compact-paths">
          <span class="setting-label">Compact paths</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="show-compact-paths" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <div>
          <label class="setting-toggle" for="show-cost">
            <span class="setting-label">Show session cost</span>
          </label>
          <div class="setting-desc">API billing only — not available on Pro or Max subscriptions</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="show-cost" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <hr class="setting-divider" />
      <div class="setting-row">
        <label class="setting-toggle" for="show-notifications">
          <span class="setting-label">Notifications</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="show-notifications" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <div class="setting-row">
        <label class="setting-toggle" for="notification-sound">
          <span class="setting-label">Sound alerts</span>
        </label>
        <label class="toggle-switch">
          <input type="checkbox" id="notification-sound" checked />
          <span class="toggle-track"></span>
        </label>
      </div>
      <hr class="setting-divider" />
      <button id="save-settings">Save</button>
    </div>
    <div id="footer"></div>
    <script src="popover.js"></script>
  </body>
</html>
